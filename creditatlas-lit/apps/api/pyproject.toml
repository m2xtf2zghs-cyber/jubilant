[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
disable_error_code = ["import-untyped"]
plugins = ["sqlalchemy.ext.mypy.plugin"]
exclude = ["alembic"]
