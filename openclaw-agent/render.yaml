services:
  - type: web
    name: openclaw-lending-api
    runtime: node
    rootDir: openclaw-agent
    plan: starter
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: APP_BASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: openclaw-postgres
          property: connectionString
      - key: STATE_FILE
        value: .data/openclaw-state.json
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v22.0
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: openclaw-postgres
    databaseName: openclaw
    user: openclaw
