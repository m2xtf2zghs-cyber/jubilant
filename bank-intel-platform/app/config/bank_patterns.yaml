bank_patterns:
  BOI:
    detect_tokens: ["BANK OF INDIA", "BKID", "STAR CONNECT"]
    row_start_regex: "^\\s*(?:\\d+\\s+)?\\d{1,2}[-/]\\d{1,2}[-/]\\d{2,4}"
  TMB:
    detect_tokens: ["TAMILNAD MERCANTILE BANK", "TMB"]
    row_start_regex: "^\\s*\\d{2}[-/]\\d{2}[-/]\\d{2,4}"
  HDFC:
    detect_tokens: ["HDFC BANK", "HDFCBANK"]
    row_start_regex: "^\\s*(?:\\d+\\s+)?\\d{1,2}[-/]\\d{1,2}[-/]\\d{2,4}"
