services:
  - type: web
    name: money-lender-statement-analyser-api
    runtime: python
    rootDir: .
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.api:app --host 0.0.0.0 --port ${PORT:-10000}
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
